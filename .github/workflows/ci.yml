# ═══════════════════════════════════════════════════════════════
#  AEQUITAS — CI Pipeline
#
#  Triggers: every pull request (any branch → main)
#            every push to main
#
#  Jobs:
#    backend  → lint + typecheck + test
#    frontend → type-check + build
#
#  Both jobs must pass before a PR can merge.
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-progress CI run for the same PR when a new
# commit is pushed — saves GitHub Actions minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Backend: lint + typecheck + test ────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest

    # Spin up Postgres + Redis as service containers.
    # They're available to the job at localhost:5432 / 6379.
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: aequitas
          POSTGRES_PASSWORD: aequitas
          POSTGRES_DB: aequitas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend   # all steps run inside /backend

    steps:
      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"              # cache pip downloads between runs

      # 3. Install all dependencies (including [dev] extras)
      - name: Install dependencies
        run: pip install -e ".[dev]"

      # 4. Ruff lint — catches style errors and common bugs
      - name: Lint (Ruff)
        run: ruff check app tests

      # 5. Ruff format check — ensures code is formatted consistently
      - name: Format check (Ruff)
        run: ruff format --check app tests

      # 6. Mypy type checking — catches type errors before runtime
      - name: Type check (Mypy)
        run: mypy app

      # 7. Pytest — run all tests with coverage
      - name: Test (Pytest)
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://aequitas:aequitas@localhost:5432/aequitas_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-not-real
          JWT_SECRET_KEY: test-jwt-key-not-real
        run: pytest tests/ --cov=app --cov-report=xml -v

      # 8. Upload coverage report to GitHub (visible on PR page)
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false   # don't fail CI if codecov is down

  # ── Frontend: typecheck + build ─────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Node with npm cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Install node modules
      - name: Install dependencies
        run: npm ci                  # ci = clean install, faster + stricter than npm install

      # TypeScript type check
      - name: Type check
        run: npx tsc --noEmit       # checks types without producing output files

      # ESLint
      - name: Lint
        run: npm run lint

      # Full Next.js build — catches any build-time errors
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
