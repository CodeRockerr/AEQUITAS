name: Keep Warm

# Render's free tier spins the service down after ~15 minutes without
# traffic, and the next visitor then waits ~50s for a cold start.
# This workflow pings /health every 10 minutes so the service never
# goes idle long enough to spin down.

on:
  schedule:
    # Every 10 minutes. Note: GitHub cron is best-effort — runs can be
    # delayed a few minutes under load, which is fine for this purpose.
    - cron: "*/10 * * * *"
  # Allow manual runs from the Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          # -f        → non-2xx/3xx responses become a non-zero exit (job fails, visible in Actions tab)
          # --max-time → don't hang forever if the service is cold-starting
          # || retry once: a cold start can exceed the first timeout, and
          # the retry both confirms recovery and completes the warm-up
          curl -fsS --max-time 60 "$HEALTH_URL" > /dev/null \
            || (sleep 20 && curl -fsS --max-time 60 "$HEALTH_URL" > /dev/null)
          echo "Service is warm."
        env:
          HEALTH_URL: https://aequitas-api.onrender.com/health
